# ──────────────────────────────────────────────────────────────────────
# nginx.conf — reverse proxy + TLS termination for Kandarp OS.
#
# Place at /etc/nginx/conf.d/kandarp.conf (on the EC2 host) or mount into
# the nginx container (see docker-compose.yml).
#
# This config:
#   • Redirects HTTP → HTTPS
#   • Terminates TLS (use Let's Encrypt certs)
#   • Proxies to the Next.js standalone server on port 3000
#   • Caches static assets aggressively
#   • Mirrors the security headers from next.config.mjs
#
# Get a free TLS cert:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Replace YOUR_DOMAIN with your actual domain (or use a template + envsubst).
# ──────────────────────────────────────────────────────────────────────

# Upstream — the Next.js standalone server.
# If nginx runs on the host and the app in Docker, use 127.0.0.1:3000.
# If nginx runs in a container on the same network, use the service name: app:3000.
upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge passthrough (for cert renewal).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS certificates (Let's Encrypt) ───────────────────────────────
    # Replace with your real cert paths from `certbot`.
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS hardening ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling (uncomment + set the bundle path if your CA supports it)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security headers (mirrors next.config.mjs) ────────────────────
    # These are also set by Next.js, but nginx sets them for every response
    # including static assets and error pages.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Next.js static assets — long immutable cache ──────────────────
    # These are content-hashed, so they can be cached for a year.
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ── Public static files (favicon, og-image, media) ────────────────
    location /public/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 1d;
        access_log off;
    }

    # ── Everything else → Next.js server ──────────────────────────────
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — admin API routes can take a moment for DB queries.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering off for streaming responses (SSE, if used).
        proxy_buffering off;
    }
}
