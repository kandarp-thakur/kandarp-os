# =============================================================================
# Kandarp OS — CI Pipeline
# =============================================================================
# Runs typecheck, lint, and build on every push and pull request.
# Ensures the refactored architecture stays type-safe and buildable.
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ADMIN_JWT_SECRET: ci-placeholder-secret-must-be-at-least-32-bytes-long
          AUTH_SECRET: ci-placeholder-secret-must-be-at-least-32-bytes-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
