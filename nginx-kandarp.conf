# ──────────────────────────────────────────────────────────────────────
# /etc/nginx/sites-available/kandarp.online — Kandarp OS reverse proxy.
#
# Serves the Next.js standalone app (Docker, 127.0.0.1:3000) behind nginx.
# Initially HTTP-only; once DNS for kandarp.online → 68.233.101.56 resolves,
# run `sudo certbot --nginx -d kandarp.online -d www.kandarp.online` and
# certbot will rewrite this file to add the 443 server block + cert paths.
# ──────────────────────────────────────────────────────────────────────

# Upstream — the Next.js standalone server in Docker, bound to loopback.
upstream kandarp_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP server (proxies to the app; certbot will add the HTTPS upgrade) ──
server {
    listen 80;
    listen [::]:80;
    server_name kandarp.online www.kandarp.online;

    # Let's Encrypt ACME challenge passthrough (for cert issuance/renewal).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Security headers (also set by Next.js, but nginx covers static + errors).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Next.js static assets — content-hashed, cache for a year.
    location /_next/static/ {
        proxy_pass http://kandarp_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Everything else → Next.js server.
    location / {
        proxy_pass http://kandarp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — admin API routes can take a moment for DB queries.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering off for streaming responses (SSE).
        proxy_buffering off;

        # Allow large uploads (media manager, backups).
        client_max_body_size 50m;
    }
}
